kind = "web"
previewPath = "/"
title = "Valentine Proposal"
version = "1.0.0"
id = "artifacts/valentine-proposal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20670

[services.development]
run = "pnpm --filter @workspace/valentine-proposal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/valentine-proposal", "run", "build" ]
publicDir = "artifacts/valentine-proposal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20670"
BASE_PATH = "/"
